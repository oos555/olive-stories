<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業のお部屋 (アプリK)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#faf7f2;color:#2b2a26;font-size:14px}
.app{max-width:960px;margin:0 auto;padding:1rem}
.oos-header{background:#c9a9a6;color:#4a3532;padding:14px 16px;font-size:16px;font-weight:bold;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",'Hiragino Sans',sans-serif;letter-spacing:.04em}
.oos-nav{background:#fff;border:1px solid #e8e2d8;border-top:none;padding:8px 12px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;border-radius:0 0 12px 12px;margin-bottom:1.25rem}
.oos-nav a{color:#55622e;text-decoration:none;font-size:13px;padding:6px 10px;border:1px solid #e8e2d8;border-radius:6px;background:#fff}
.oos-nav a.current{background:#55622e;color:#fff;border-color:#55622e;font-weight:700}
.oos-nav a:hover:not(.current){background:#eef0e5}
.oos-nav a.nav-gray{background:#efefeb;border-color:#d6d6ce;color:#2b2a26}
.oos-nav a.nav-blue{background:#e3eef8;border-color:#bdd7ec;color:#2c5578}
.oos-nav a.nav-gray:hover:not(.current){background:#e3e3dd}
.oos-nav a.nav-blue:hover:not(.current){background:#d2e3f2}
.oos-nav a.nav-lock{position:relative;padding-right:22px}
.oos-nav a.nav-lock::after{content:'🔒';position:absolute;top:2px;right:5px;font-size:9px;line-height:1}
.nav-group{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:5px 8px;border-radius:10px}
.nav-group-label{font-size:10px;font-weight:700;letter-spacing:.04em;margin-right:2px;opacity:.8}
.nav-marche{background:rgba(163,177,138,.14)}
.nav-marche .nav-group-label{color:#55622e}
.nav-kobo{background:rgba(203,179,124,.18)}
.nav-kobo .nav-group-label{color:#8a6d3f}
.nav-atelier{background:rgba(201,169,166,.16)}
.nav-atelier .nav-group-label{color:#8d6a66}

.card{background:#fff;border:1px solid #e8e2d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.sec{font-size:14px;font-weight:700;margin:0 0 12px}
.info-box{background:#f7f3ed;border-radius:8px;padding:11px 14px;font-size:13px;color:#2b2a26;line-height:1.6;margin-bottom:1rem;border:1px solid #e8e2d8}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-primary{background:#6b7a3a;color:#fff}
.btn-primary:hover{background:#55622e}
.btn-sm{font-size:11px;padding:4px 10px;border:1px solid #d8cfc4;border-radius:6px;background:#fff;color:#2b2a26;cursor:pointer}
.btn-sm:hover{background:#f7f3ed}
#sync-status{position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;transition:opacity .5s;opacity:0}
</style>
</head>
<body>
<div class="app">

<header class="oos-header no-print">
  <span>💼 営業 K</span>
</header>
<nav class="oos-nav no-print">
  <a href="home.html">🏠 玄関</a>
  <a href="import.html">✈️ 輸入 E</a>
  <a href="documents.html">📂 書類 G</a>
  <a href="marketing.html">📣 マーケ H</a>
  <a href="hiromi.html">🗒️ ひろみ I</a>
  <a class="current" href="eigyo.html">💼 営業 K</a>
</nav>
</div>

<div id="locked-view">
  <div class="card" style="max-width:400px;margin:2rem auto;text-align:center">
    <div style="font-size:32px;margin-bottom:10px">🔒</div>
    <div class="sec">営業のお部屋（社長専用）</div>
    <div class="info-box">このページは玄関からお入りください。</div>
    <a href="home.html" class="btn btn-primary" style="display:inline-block;text-decoration:none">🏠 玄関へ</a>
  </div>
</div>

<div id="unlocked-view" style="display:none">
  <div class="card">
    <div class="sec">🤝 取引先メモ（RT・卸のお客様）</div>
    <div class="info-box">RT（ホテル・レストラン）や卸のお客様ごとに、値引き交渉の経緯・好み・注意点などを自由に書き留めておく場所です。新しく増やす時は下の「＋新しい取引先を追加」から。</div>
    <input type="text" id="partner-search" placeholder="取引先名で検索" oninput="renderPartnerList()" style="width:100%;padding:9px 12px;border:1px solid #d5cfc3;border-radius:8px;font-size:13px;margin-bottom:10px">
    <button class="btn-sm" onclick="addPartner()">＋ 新しい取引先を追加</button>
  </div>
  <div id="partner-list"></div>
</div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwRNgyNZ3HjU7nPSpxCn7uUiMu3MY6ZijEsCtB7Toj_7x9Fu1v5VFyMDLheNZAON4OV/exec';
let salesPartners = [];

/* ---------- 社長専用グループの合鍵（この端末ではずっと有効・サーバー照合方式） ---------- */
function oosSavedPw(group){
  try{ const v = JSON.parse(localStorage.getItem('oos_unlock_'+group)||'null'); if(v && v.p) return v.p; }catch(e){}
  return null;
}
function oosMarkUnlocked(group, pw){
  try{ localStorage.setItem('oos_unlock_'+group, JSON.stringify({p:pw})); }catch(e){}
}
function oosClearUnlock(group){ try{ localStorage.removeItem('oos_unlock_'+group); }catch(e){} }
function oosAtelierOk(){ try{ return localStorage.getItem('oos_atelier_ok') === '1'; }catch(e){ return false; } }

document.addEventListener('DOMContentLoaded', function(){
  const saved = oosSavedPw('secret');
  if(saved && oosAtelierOk()){ autoUnlock(saved); }
});

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

function showSyncStatus(msg,isError){
  let el = document.getElementById('sync-status');
  if(!el){ el=document.createElement('div'); el.id='sync-status'; document.body.appendChild(el); }
  el.textContent = msg;
  el.style.background = isError ? '#fee2e2' : '#dcfce7';
  el.style.color = isError ? '#7f1d1d' : '#14532d';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; }, 3000);
}

/* ★2026-07-08 仕様変更：
   毎回サーバーへパスワードの正誤を問い合わせて画面を開くかどうかを決める
   のをやめ、玄関の外側の鍵と同じ「一度確認できたら、ローカルの印
   (oos_atelier_ok)だけを見る」方式に統一。画面は必ず開き、取引先データの
   読み込みはその後の別ステップとして行う（失敗してもロック画面には戻さない）。 */
async function autoUnlock(pw){
  document.getElementById('locked-view').style.display = 'none';
  document.getElementById('unlocked-view').style.display = 'block';
  showSyncStatus('✅ 読み込みました');
  loadPartners();
}

// ── 取引先メモ（RT・卸のお客様） ────────────────────────────────────────────
async function loadPartners(){
  document.getElementById('partner-list').innerHTML = '<div style="color:#57534e;padding:8px">読み込み中...</div>';
  try{
    const res = await fetch(GAS_URL + '?action=loadAllData');
    const data = await res.json();
    if(data.status==='ok'){
      salesPartners = data.data.salesPartners || [];
      renderPartnerList();
    } else {
      document.getElementById('partner-list').innerHTML = '<div style="color:#dc2626;padding:8px">読み込みに失敗しました</div>';
    }
  }catch(err){
    document.getElementById('partner-list').innerHTML = '<div style="color:#dc2626;padding:8px">通信エラーが発生しました</div>';
  }
}
function renderPartnerList(){
  const q = (document.getElementById('partner-search').value||'').toLowerCase();
  let list = salesPartners.filter(p=>!q || (p.name||'').toLowerCase().includes(q));
  list.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ja'));
  const el = document.getElementById('partner-list');
  if(!list.length){ el.innerHTML = '<div style="color:#57534e;font-size:13px;padding:8px 0">まだ取引先メモがありません。「＋新しい取引先を追加」から始めてください。</div>'; return; }
  el.innerHTML = list.map(function(p){
    return '<div class="card" style="margin-bottom:8px" id="partner-'+p.id+'">'+
      '<div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px">'+
      '<div style="flex:1;min-width:160px"><label style="font-size:11px;color:#2b2a26;display:block;margin-bottom:3px">取引先名</label><input type="text" id="p-name-'+p.id+'" value="'+esc(p.name)+'" style="width:100%;padding:6px 8px;border:1px solid #d5cfc3;border-radius:4px;font-size:13px;font-weight:700"></div>'+
      '<div style="width:140px"><label style="font-size:11px;color:#2b2a26;display:block;margin-bottom:3px">区分</label><select id="p-cat-'+p.id+'" style="width:100%;padding:6px;border:1px solid #d5cfc3;border-radius:4px;font-size:12px">'+
      ['RT','卸①','卸②','その他'].map(function(c){ return '<option value="'+c+'"'+(p.category===c?' selected':'')+'>'+c+'</option>'; }).join('')+
      '</select></div>'+
      '<button class="btn-sm" onclick="deletePartner(\''+p.id+'\')">削除</button>'+
      '</div>'+
      '<textarea id="p-note-'+p.id+'" placeholder="値引き交渉の経緯・好み・注意点など" style="width:100%;min-height:70px;padding:8px;border:1px solid #d5cfc3;border-radius:6px;font-size:13px">'+esc(p.note||'')+'</textarea>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">'+
      '<span style="font-size:10px;color:#57534e">最終更新：'+(p.updatedAt?new Date(p.updatedAt).toLocaleString('ja-JP'):'-')+'</span>'+
      '<button class="btn-sm" onclick="savePartner(\''+p.id+'\')">保存</button>'+
      '</div></div>';
  }).join('');
}
function addPartner(){
  const id = 'partner_'+Date.now();
  salesPartners.unshift({ id: id, name:'', category:'RT', note:'', updatedAt:new Date().toISOString() });
  renderPartnerList();
  document.getElementById('p-name-'+id).focus();
}
async function savePartner(id){
  const p = salesPartners.find(x=>x.id===id);
  if(!p) return;
  const name = document.getElementById('p-name-'+id).value.trim();
  if(!name){ alert('取引先名を入力してください'); return; }
  p.name = name;
  p.category = document.getElementById('p-cat-'+id).value;
  p.note = document.getElementById('p-note-'+id).value;
  p.updatedAt = new Date().toISOString();
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({ action:'saveAllData', payload:{ salesPartners: salesPartners } }),
      headers: {'Content-Type':'text/plain;charset=utf-8'}
    });
    const data = await res.json();
    if(data.status==='ok'){ renderPartnerList(); showSyncStatus('✅ 保存しました'); }
    else { alert('保存に失敗しました'); }
  }catch(err){
    alert('通信エラーが発生しました');
  }
}
async function deletePartner(id){
  const p = salesPartners.find(x=>x.id===id);
  if(!confirm((p&&p.name?p.name:'この取引先')+'のメモを削除しますか？')) return;
  salesPartners = salesPartners.filter(x=>x.id!==id);
  try{
    await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({ action:'saveAllData', payload:{ salesPartners: salesPartners } }),
      headers: {'Content-Type':'text/plain;charset=utf-8'}
    });
    showSyncStatus('✅ 削除しました');
  }catch(err){}
  renderPartnerList();
}
</script>
</body>
</html>
