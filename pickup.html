const NOSHI_IMAGE = 'noshi-flower.png';
const LEAD_LABEL = {normal:'通常（3日以内）', urgent:'🚨急ぎ（明日まで）', defect:'🔵不良在庫出荷', caution:'🟡特別注意', scheduled:'🗓 日程指定'};

function computeDueDateISO(o){
  if(o.leadType==='scheduled') return o.leadDate || '';
  const days = o.leadType==='urgent' ? 1 : (o.leadType==='normal' ? 3 : null);
  if(days===null) return '';
  const base = o.registeredAt ? new Date(o.registeredAt) : new Date();
  base.setDate(base.getDate()+days);
  return base.toISOString().slice(0,10);
}
function formatDateJp(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function leadLabelWithDate(o){
  const due = computeDueDateISO(o);
  const dueStr = due ? formatDateJp(due)+'までに出荷' : '';
  if(o.leadType==='urgent') return '🚨急ぎ'+(dueStr?'（'+dueStr+'）':'（明日まで）');
  if(o.leadType==='normal') return '通常'+(dueStr?'（'+dueStr+'）':'（3日以内）');
  if(o.leadType==='defect') return '🔵不良在庫出荷';
  if(o.leadType==='caution') return '🟡特別注意';
  if(o.leadType==='scheduled') return '🗓 '+(due?formatDateJp(due)+'までに出荷':'日程未指定');
  return o.leadType;
}
function isOverdue(o){
  if(o.status!=='pending') return false;
  const due = computeDueDateISO(o);
  if(!due) return false;
  const todayISO = new Date().toISOString().slice(0,10);
  return due < todayISO;
}

function findProduct(pid){ return PRODUCTS.find(p=>p.id==pid); }
function findProductBySku(sku){ return PRODUCTS.find(p=>p.sku===sku); }

// ── 商品マスタ：GASからの読み込み（キャッシュ先手・GAS裏取り・フォールバック）────
let EXTRA_FIELDS = [];
const PRODUCTS_CACHE_KEY = 'oos_products_cache_v1';

function loadProductsFromCache(){
  try{
    const raw = localStorage.getItem(PRODUCTS_CACHE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(obj && Array.isArray(obj.products) && obj.products.length) return obj;
  }catch(e){}
  return null;
}
function saveProductsToCache(products, extraFields){
  try{
    localStorage.setItem(PRODUCTS_CACHE_KEY, JSON.stringify({ products: products, extraFields: extraFields||[] }));
  }catch(e){}
}
function applyLoadedProducts(products, extraFields){
  if(!products || !products.length) return;
  PRODUCTS = products;
  EXTRA_FIELDS = extraFields || [];
  // 「不良品を報告する」画面が開いている場合は、商品プルダウンを選択値を保ったまま作り直す
  const dfSelect = document.getElementById('df-product');
  if(dfSelect){
    const prev = dfSelect.value;
    dfSelect.innerHTML = productOptionsHtml();
    if(prev) dfSelect.value = prev;
  }
}
async function initializeProducts(){
  const cached = loadProductsFromCache();
  if(cached) applyLoadedProducts(cached.products, cached.extraFields);
  try{
    const res = await fetch(GAS_URL + '?action=loadProducts');
    const data = await res.json();
    if(data && data.status==='ok' && Array.isArray(data.products) && data.products.length){
      saveProductsToCache(data.products, data.extraFields);
      applyLoadedProducts(data.products, data.extraFields);
    }
  }catch(e){
    // 通信失敗時はキャッシュ、またはハードコードの初期値のまま動作を続ける
  }
}

// 発送完了時に、注文の商品分だけ在庫（アプリB）を自動で減らす
async function deductStockAndSave(o){
  try{
    const res = await fetch(GAS_URL + '?action=loadAllData');
    const data = await res.json();
    if(data.status!=='ok' || !data.data) return;
    const lots = (data.data.lots||[]).map(function(l){
      return { id:l.id, pid:parseInt(l.pid), productName:l.productName||'', lotCode:l.lotCode, expiry:l.expiry, stock:parseInt(l.stock)||0, defect:l.defect, status:l.status, note:l.note, incoming:parseInt(l.incoming)||0 };
    });
    const defects = (data.data.defects||[]).map(function(d){
      return { id:d.id, pid:parseInt(d.pid), productName:d.productName||'', lotId:d.lotId, qty:parseInt(d.qty)||0, cat:d.cat, note:d.note, status:d.status, shippedQty:parseInt(d.shippedQty)||0, processedAt:d.processedAt||'' };
    });
    const needed = {};
    (o.lines||[]).forEach(function(l){
      const p = findProduct(l.productId);
      if(!p) return;
      const totalQty = (l.bottles||0) + (l.boxes||0)*(l.boxQty||p.boxQty||1);
      if(p.isSet && p.components){
        p.components.forEach(function(c){ needed[c.sku] = (needed[c.sku]||0) + totalQty*(c.qty||1); });
      } else {
        needed[p.sku] = (needed[p.sku]||0) + totalQty;
      }
    });
    const isDefectOrder = o.customerType === 'defectprice';
    Object.keys(needed).forEach(function(sku){
      let remain = needed[sku];
      const prod = findProductBySku(sku);
      if(!prod || remain<=0) return;
      if(isDefectOrder){
        const matchingDefects = defects.filter(d=>d.pid===prod.id && d.status!=='resolved').sort((a,b)=>String(a.processedAt||'').localeCompare(String(b.processedAt||'')));
        matchingDefects.forEach(function(d){
          if(remain<=0) return;
          const defectRemain = Math.max(0,(d.qty||0)-(d.shippedQty||0));
          const take = Math.min(defectRemain, remain);
          if(take<=0) return;
          d.shippedQty = (d.shippedQty||0) + take;
          d.processedAt = new Date().toISOString();
          if(d.shippedQty >= d.qty) d.status = 'resolved';
          remain -= take;
        });
      } else {
        const matching = lots.filter(l=>l.pid===prod.id && l.status==='new').sort((a,b)=>String(a.expiry||'').localeCompare(String(b.expiry||'')));
        matching.forEach(function(l){
          if(remain<=0) return;
          const take = Math.min(l.stock||0, remain);
          if(take<=0) return;
          l.stock -= take; remain -= take;
        });
      }
    });
    await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({ action:'saveAllData', payload:{ lots: lots, defects: defects } }),
      headers: {'Content-Type':'text/plain;charset=utf-8'}
    });
  }catch(e){
    // 在庫更新に失敗しても発送完了自体は成功させる（あとでアプリBで確認してください）
  }
}

/* ════════════════════════════════════════════════════════════════
   熨斗（のし）印刷 — すみれ画像を使ったA4横1枚
   受注の noshi:{ title, name, company, position } を使います。
   印刷前に必ずプレビュー（見本）を表示してから印刷します。
   ════════════════════════════════════════════════════════════════ */
let noshiPrinted = false;

function hasNoshi(o){
  return !!(o && o.noshi && (o.noshi.title || o.noshi.name || o.noshi.company || o.noshi.position));
}
function buildNoshiHtml(n){
  const title = esc(n.title||'');
  const name = esc(n.name||'');
  const company = esc(n.company||'');
  const position = esc(n.position||'');
  const titleChars = title.split('').map(c=>'<div>'+c+'</div>').join('');
  const nameChars = name.split('').map(function(c){ return c===' '||c==='　' ? '<div style="height:.5em"></div>' : '<div>'+c+'</div>'; }).join('');
  const sideLines = [position, company].filter(Boolean);
  const sideChars = sideLines.length
    ? sideLines.map(function(line){ return '<div class="noshi-side-col">'+line.split('').map(c=>'<div>'+esc(c)+'</div>').join('')+'</div>'; }).join('')
    : '';
  let html = '';
  html += '<div class="noshi-sheet">';
  html +=   '<div class="noshi-title">'+titleChars+'</div>';
  html +=   '<img class="noshi-img" src="'+NOSHI_IMAGE+'" alt="熨斗の花飾り" onerror="this.style.display=\'none\';var w=document.getElementById(\'noshi-img-fallback\');if(w)w.style.display=\'block\'">';
  html +=   '<div id="noshi-img-fallback" style="display:none;text-align:center;color:#b91c1c;font-size:13px;font-weight:700;padding:10px">⚠️ 花の画像（'+NOSHI_IMAGE+'）が読み込めませんでした。GitHubにこの名前で画像が上がっているか確認してください。</div>';
  html +=   '<div class="noshi-namewrap">';
  html +=     (sideChars ? '<div class="noshi-side">'+sideChars+'</div>' : '');
  html +=     '<div class="noshi-name">'+nameChars+'</div>';
  html +=   '</div>';
  html += '</div>';
  return html;
}

let warehouseNotes = [];

async function init(){
  if(isInAppBrowser()){
    document.getElementById('inapp-banner').style.display = 'block';
  }
  const id = getParam('id');
  const mode = getParam('mode');
  if(id){
    await loadSingleOrder(id);
  } else if(mode==='defect'){
    renderDefectForm();
  } else if(mode==='notes'){
    await loadNotesScreen();
  } else if(mode==='materials'){
    await loadMaterialsScreen();
  } else {
    await loadOrderList();
  }
}

async function fetchWarehouseNotes(){
  try{
    const res = await fetch(GAS_URL + '?action=loadAllData');
    const data = await res.json();
    if(data.status==='ok' && data.data && Array.isArray(data.data.warehouseNotes)){
      warehouseNotes = data.data.warehouseNotes;
    }
  }catch(e){ /* メモが読み込めなくても他の機能は使えるようにする */ }
}
function getGlobalNote(){
  const n = warehouseNotes.find(x=>x.type==='global');
  return n ? n.note : '';
}
function findCustomerNote(clientName){
  if(!clientName) return null;
  return warehouseNotes.find(x=>x.type==='customer' && x.key===clientName && x.note) || null;
}
async function saveWarehouseNotes(){
  await fetch(GAS_URL, {
    method:'POST',
    body: JSON.stringify({ action:'saveAllData', payload:{ warehouseNotes: warehouseNotes } }),
    headers: {'Content-Type':'text/plain;charset=utf-8'}
  });
}

async function loadSingleOrder(id){
  document.getElementById('content').innerHTML = '<div class="spinner">読み込み中...</div>';
  try{
    const res = await fetch(GAS_URL + '?action=getPickOrder&orderId=' + encodeURIComponent(id));
    const data = await res.json();
    if(data.status !== 'ok'){
      document.getElementById('content').innerHTML = '<div class="alert-danger">受注が見つかりませんでした。QRコードが古い可能性があります。</div>';
      return;
    }
    currentOrder = data.order;
    noshiPrinted = false;
    await fetchWarehouseNotes();
    if(currentOrder.orderStatus === 'shipped'){
      renderAlreadyShipped();
    } else {
      renderOrder();
    }
  }catch(err){
    document.getElementById('content').innerHTML = '<div class="alert-danger">通信エラーが発生しました。電波の良い場所でもう一度お試しください。<br><br>'+esc(err.message)+'</div>';
  }
}

async function loadOrderList(){
  document.getElementById('content').innerHTML = '<div class="spinner">読み込み中...</div>';
  try{
    const [res, ] = await Promise.all([fetch(GAS_URL + '?action=loadAll'), fetchWarehouseNotes()]);
    const data = await res.json();
    if(data.status !== 'ok' || !data.data || !Array.isArray(data.data.orders)){
      document.getElementById('content').innerHTML = '<div class="alert-danger">一覧を読み込めませんでした。</div>';
      return;
    }
    // 出荷待ち、かつ「発送元から出荷指示が送られたもの」だけを表示します
    allOrders = data.data.orders.filter(o=>o.status==='pending' && o.notified===true);
    renderList();
  }catch(err){
    document.getElementById('content').innerHTML = '<div class="alert-danger">通信エラーが発生しました。電波の良い場所でもう一度お試しください。<br><br>'+esc(err.message)+'</div>';
  }
}

function recipientLabel(o){
  if(o.isCompany){
    return [o.companyName, o.positionName, o.personName].filter(Boolean).join(' ') || o.client;
  }
  return o.recipientName || o.client;
}

function renderList(){
  const urgent = allOrders.filter(o=>o.leadType==='urgent').length;
  const gift = allOrders.filter(o=>(o.lines||[]).some(l=>l.giftType==='gift')).length;
  const overdue = allOrders.filter(o=>isOverdue(o)).length;
  let html = '';
  if(overdue){
    html += '<div class="alert-danger no-print">⏰ 出荷期限を過ぎているものが'+overdue+'件あります。優先して確認してください。</div>';
  }
  const globalNote = getGlobalNote();
  if(globalNote){
    html += '<div class="note-box no-print" style="margin-bottom:14px">📌 '+esc(globalNote).replace(/\n/g,'<br>')+'</div>';
  }
  html += '<div class="summary-card">';
  html += '<div class="summary-num">📦 出荷指示 '+allOrders.length+'件</div>';
  const parts = [];
  if(urgent) parts.push('🚨急ぎ '+urgent+'件');
  if(gift) parts.push('🎁ギフト '+gift+'件');
  html += '<div class="summary-sub">'+(parts.length?parts.join('　'):'急ぎ・ギフトはありません')+'</div>';
  html += '</div>';
  html += '<button class="refresh-btn no-print" onclick="loadOrderList()">🔄 一覧を更新する</button>';
  html += '<button class="defect-btn no-print" onclick="location.href=\'pickup.html?mode=defect\'">🔴 不良品を見つけたので報告する</button>';
  html += '<button class="refresh-btn no-print" style="border-color:#7c3aed;color:#5b21b6" onclick="location.href=\'pickup.html?mode=notes\'">📝 メモを見る・書く</button>';
  html += '<button class="refresh-btn no-print" style="border-color:#92400e;color:#92400e" onclick="location.href=\'pickup.html?mode=materials\'">📦 資材カタログ（写真・数）</button>';
  if(!allOrders.length){
    html += '<div class="card center" style="color:#57534e">現在、届いている出荷指示はありません。</div>';
  } else {
    allOrders.slice().sort(function(a,b){
      // 期限超過・急ぎを先頭に、あとは登録が古い順
      const ao = isOverdue(a)?0:1, bo = isOverdue(b)?0:1;
      if(ao!==bo) return ao-bo;
      const au = a.leadType==='urgent'?0:1, bu = b.leadType==='urgent'?0:1;
      if(au!==bu) return au-bu;
      return (a.registeredAt||'').localeCompare(b.registeredAt||'');
    }).forEach(function(o){
      const hasGift = (o.lines||[]).some(l=>l.giftType==='gift');
      const leadCls = LEAD_BADGE_CLASS[o.leadType]||'b-normal';
      const overdueNow = isOverdue(o);
      const custNote = findCustomerNote(o.client);
      html += '<div class="order-item" style="'+(overdueNow?'border-color:#dc2626;border-width:2px':'')+'" onclick="location.href=\'?id='+encodeURIComponent(o.id)+'\'">';
      html += '<div class="oi-top"><span class="oi-name">'+esc(recipientLabel(o))+'</span>';
      html += '<span>'+(custNote?'<span class="badge" style="margin:0 0 0 4px;background:#ede9fe;color:#5b21b6">📝メモあり</span>':'')+(hasNoshi(o)?'<span class="badge" style="margin:0 0 0 4px;background:#fdf0e3;color:#8a5a1c">🎀熨斗</span>':'')+(overdueNow?'<span class="badge b-urgent" style="margin:0 0 0 4px;background:#7f1d1d;color:#fff">⏰期限超過</span>':'')+(o.leadType==='urgent'?'<span class="badge '+leadCls+'" style="margin:0 0 0 4px">🚨</span>':'')+(hasGift?'<span class="badge b-gift" style="margin:0 0 0 4px">🎁</span>':'')+'</span></div>';
      html += '<div class="oi-num">'+esc(o.num)+'　'+leadLabelWithDate(o)+'</div>';
      html += '<div class="oi-products">'+(o.lines||[]).map(l=>esc(l.productName)+' ×'+esc(l.bottles)).join('　')+'</div>';
      html += '</div>';
    });
  }
  document.getElementById('content').innerHTML = html;
}

function showToastSimple(msg){
  let el = document.getElementById('undo-toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'undo-toast';
    el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#8c7a68;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:9999';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.display='none'; }, 2500);
}

function resizeImageFile(file, maxSize){
  return new Promise(function(resolve){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w>h){ if(w>maxSize){ h = Math.round(h*maxSize/w); w = maxSize; } }
        else { if(h>maxSize){ w = Math.round(w*maxSize/h); h = maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  if(fileInput.files && fileInput.files[0]){

async function submitDefect(){

    const res = await fetch(GAS_URL + '?action=loadAllData');
    const data = await res.json();
    const defects = (data.status==='ok' && data.data && data.data.defects) ? data.data.defects : [];
    defects.push({
      id: 'def_'+Date.now(), pid: p.id, productName: p.name, lotId: '',
      qty: qty, cat: cat, note: note, status: 'pending', shippedQty: 0, processedAt: ''
    });

      method: 'POST',
      body: JSON.stringify({ action:'saveAllData', payload:{ defects: defects } }),
      headers: {'Content-Type':'text/plain;charset=utf-8'}
    });
    const saveData = await saveRes.json();
    if(saveData.status==='ok'){
      document.getElementById('content').innerHTML =
        '<div class="done-banner">✅ 不良品を報告しました<br><span style="font-size:13px;font-weight:400">'+esc(p.name)+'　'+qty+'本　['+esc(cat)+']</span></div>'+

        '<button class="btn-big btn-print no-print" onclick="location.href=\'pickup.html\'">← 出荷待ち一覧に戻る</button>';
    } else {
      btn.disabled = false; btn.textContent = 'この内容で報告する';
      alert('送信に失敗しました：'+(saveData.message||''));
    }
  }catch(err){
    btn.disabled = false; btn.textContent = 'この内容で報告する';
    alert('通信エラーが発生しました：'+err.message);
  }

async function saveShipNote(){
  if(!currentOrder) return;
  const val = document.getElementById('ship-note-input').value;
  try{
    const res = await fetch(GAS_URL + '?action=loadAll');
    const data = await res.json();
    if(data.status!=='ok' || !data.data || !Array.isArray(data.data.orders)) return;
    const allOrders = data.data.orders;
    const target = allOrders.find(o=>o.id===currentOrder.id);
    if(!target){ alert('受注が見つかりませんでした'); return; }
    target.shipNote = val;
    const saveRes = await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({ action:'saveOrders', orders: allOrders }),
      headers: {'Content-Type':'text/plain;charset=utf-8'}
    });
    const saveData = await saveRes.json();
    if(saveData.status==='ok'){
      currentOrder.shipNote = val;
      renderOrder();
    } else {
      alert('保存に失敗しました');
    }
  }catch(err){
    alert('通信エラーが発生しました：'+err.message);
  }
}

      btn.disabled = false;
      btn.textContent = '✅ 発送完了にする';
      alert('処理に失敗しました：'+(data.message||''));
    }
  }catch(err){
    btn.disabled = false;
    btn.textContent = '✅ 発送完了にする';
    alert('通信エラーが発生しました：'+err.message);
  }
}

initializeProducts();
init();
</script>
</body>
