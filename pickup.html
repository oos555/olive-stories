<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピッキング確認</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:15px;-webkit-tap-highlight-color:transparent}
.app{max-width:520px;margin:0 auto;padding:14px}
.topbar{background:#1a1a18;color:#fff;padding:12px 16px;border-radius:12px;margin-bottom:14px;text-align:center;font-weight:700;font-size:15px}
.card{background:#fff;border:1px solid #e8e7e3;border-radius:12px;padding:16px;margin-bottom:14px}
.center{text-align:center}
.spinner{font-size:14px;color:#888;padding:40px 0;text-align:center}
.alert-danger{background:#fee2e2;border:2px solid #dc2626;color:#7f1d1d;border-radius:10px;padding:16px;margin-bottom:14px;font-size:14px;line-height:1.7}
.alert-shipped-btn{width:100%;padding:14px;margin-top:10px;border-radius:8px;border:1px solid #dc2626;background:#fff;color:#dc2626;font-weight:700;font-size:14px}
.badge{display:inline-block;padding:5px 12px;border-radius:99px;font-size:13px;font-weight:700;margin:2px 4px 2px 0}
.b-urgent{background:#fee2e2;color:#991b1b}
.b-defect{background:#dbeafe;color:#1e3a8a}
.b-caution{background:#fef3c7;color:#78350f}
.b-normal{background:#f1f5f9;color:#475569}
.b-gift{background:#fce7f3;color:#9d174d}
.b-recycle{background:#dcfce7;color:#14532d}
.meta-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0efe9;font-size:14px}
.meta-row:last-child{border-bottom:none}
.meta-label{color:#888;font-size:12px}
.meta-val{font-weight:700;text-align:right}
.note-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-top:10px;font-size:14px;color:#7f1d1d;font-weight:600}
.sec-title{font-size:13px;font-weight:700;color:#888;margin:18px 0 8px}
.item{display:flex;align-items:center;gap:12px;background:#f9f8f5;border-radius:10px;padding:14px;margin-bottom:8px;border:2px solid transparent}
.item.checked{background:#dcfce7;border-color:#16a34a}
.item .cb{width:26px;height:26px;flex-shrink:0}
.item .info{flex:1}
.item .pname{font-weight:700;font-size:15px}
.item .psub{font-size:12px;color:#666;margin-top:2px}
.item .pmemo{font-size:12px;color:#dc2626;margin-top:2px}
.actions{position:sticky;bottom:0;background:#f5f4f0;padding:10px 0;margin-top:10px}
.btn-big{width:100%;padding:16px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn-complete{background:#16a34a;color:#fff}
.btn-complete:disabled{background:#a7d8b8;color:#eee}
.btn-print{background:#fff;color:#1a1a18;border:1px solid #ccc}
.done-banner{background:#dcfce7;border:2px solid #16a34a;color:#14532d;border-radius:10px;padding:16px;text-align:center;font-weight:700;font-size:16px;margin-bottom:14px}
.summary-card{background:#1a1a18;color:#fff;border-radius:12px;padding:16px;margin-bottom:14px;text-align:center}
.summary-num{font-size:28px;font-weight:700}
.summary-sub{font-size:13px;color:#ccc;margin-top:4px}
.order-item{background:#fff;border:1px solid #e8e7e3;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.order-item:active{background:#f5f4f0}
.order-item .oi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.order-item .oi-name{font-weight:700;font-size:15px}
.order-item .oi-num{font-size:11px;color:#999}
.order-item .oi-products{font-size:12px;color:#666;margin-top:4px}
.refresh-btn{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;background:#fff;color:#1a1a18;font-weight:600;font-size:14px;margin-bottom:14px}
.back-link{display:inline-block;margin-bottom:10px;color:#185fa5;font-size:13px;font-weight:600;cursor:pointer}
@media print{
  .no-print{display:none!important}
  body{background:#fff}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar no-print">📦 ピッキング確認</div>
  <div id="content"><div class="spinner">読み込み中...</div></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwRNgyNZ3HjU7nPSpxCn7uUiMu3MY6ZijEsCtB7Toj_7x9Fu1v5VFyMDLheNZAON4OV/exec';
const LEAD_LABEL = {normal:'通常（3日以内）', urgent:'🚨急ぎ（明日まで）', defect:'🔵不良在庫出荷', caution:'🟡特別注意', scheduled:'🗓 日程指定'};
const LEAD_BADGE_CLASS = {normal:'b-normal', urgent:'b-urgent', defect:'b-defect', caution:'b-caution', scheduled:'b-normal'};
const GIFT_TYPE_LABEL = { normal:'通常', gift:'ギフト', simple:'簡易ギフト', sample_free:'サンプル(無償)', sample_paid:'サンプル(有償)' };

let currentOrder = null;
let allOrders = [];

function getParam(name){
  const params = new URLSearchParams(location.search);
  return params.get(name);
}

function esc(s){ return (s==null?'':String(s)); }

async function init(){
  const id = getParam('id');
  if(id){
    await loadSingleOrder(id);
  } else {
    await loadOrderList();
  }
}

async function loadSingleOrder(id){
  document.getElementById('content').innerHTML = '<div class="spinner">読み込み中...</div>';
  try{
    const res = await fetch(GAS_URL + '?action=getPickOrder&orderId=' + encodeURIComponent(id));
    const data = await res.json();
    if(data.status !== 'ok'){
      document.getElementById('content').innerHTML = '<div class="alert-danger">受注が見つかりませんでした。QRコードが古い可能性があります。</div>';
      return;
    }
    currentOrder = data.order;
    if(currentOrder.orderStatus === 'shipped'){
      renderAlreadyShipped();
    } else {
      renderOrder();
    }
  }catch(err){
    document.getElementById('content').innerHTML = '<div class="alert-danger">通信エラーが発生しました。電波の良い場所でもう一度お試しください。<br><br>'+esc(err.message)+'</div>';
  }
}

async function loadOrderList(){
  document.getElementById('content').innerHTML = '<div class="spinner">読み込み中...</div>';
  try{
    const res = await fetch(GAS_URL + '?action=loadAll');
    const data = await res.json();
    if(data.status !== 'ok' || !data.data || !Array.isArray(data.data.orders)){
      document.getElementById('content').innerHTML = '<div class="alert-danger">一覧を読み込めませんでした。</div>';
      return;
    }
    // 出荷待ち、かつ「発送元から出荷指示が送られたもの」だけを表示します
    allOrders = data.data.orders.filter(o=>o.status==='pending' && o.notified===true);
    renderList();
  }catch(err){
    document.getElementById('content').innerHTML = '<div class="alert-danger">通信エラーが発生しました。電波の良い場所でもう一度お試しください。<br><br>'+esc(err.message)+'</div>';
  }
}

function recipientLabel(o){
  if(o.isCompany){
    return [o.companyName, o.positionName, o.personName].filter(Boolean).join(' ') || o.client;
  }
  return o.recipientName || o.client;
}

function renderList(){
  const urgent = allOrders.filter(o=>o.leadType==='urgent').length;
  const gift = allOrders.filter(o=>(o.lines||[]).some(l=>l.giftType==='gift')).length;
  let html = '';
  html += '<div class="summary-card">';
  html += '<div class="summary-num">📦 出荷指示 '+allOrders.length+'件</div>';
  const parts = [];
  if(urgent) parts.push('🚨急ぎ '+urgent+'件');
  if(gift) parts.push('🎁ギフト '+gift+'件');
  html += '<div class="summary-sub">'+(parts.length?parts.join('　'):'急ぎ・ギフトはありません')+'</div>';
  html += '</div>';
  html += '<button class="refresh-btn no-print" onclick="loadOrderList()">🔄 一覧を更新する</button>';
  if(!allOrders.length){
    html += '<div class="card center" style="color:#999">現在、届いている出荷指示はありません。</div>';
  } else {
    allOrders.slice().sort(function(a,b){
      // 急ぎを先頭に、あとは登録が古い順
      const au = a.leadType==='urgent'?0:1, bu = b.leadType==='urgent'?0:1;
      if(au!==bu) return au-bu;
      return (a.registeredAt||'').localeCompare(b.registeredAt||'');
    }).forEach(function(o){
      const hasGift = (o.lines||[]).some(l=>l.giftType==='gift');
      const leadCls = LEAD_BADGE_CLASS[o.leadType]||'b-normal';
      html += '<div class="order-item" onclick="location.href=\'?id='+encodeURIComponent(o.id)+'\'">';
      html += '<div class="oi-top"><span class="oi-name">'+esc(recipientLabel(o))+'</span>';
      html += '<span>'+(o.leadType==='urgent'?'<span class="badge '+leadCls+'" style="margin:0 0 0 4px">🚨</span>':'')+(hasGift?'<span class="badge b-gift" style="margin:0 0 0 4px">🎁</span>':'')+'</span></div>';
      html += '<div class="oi-num">'+esc(o.num)+'</div>';
      html += '<div class="oi-products">'+(o.lines||[]).map(l=>esc(l.productName)+' ×'+esc(l.bottles)).join('　')+'</div>';
      html += '</div>';
    });
  }
  document.getElementById('content').innerHTML = html;
}

function renderAlreadyShipped(){
  const o = currentOrder;
  document.getElementById('content').innerHTML =
    '<div class="alert-danger">'+
      '⚠️ この注文（'+esc(o.num)+'）は<strong>すでに発送完了として処理されています。</strong><br><br>'+
      '二重にスキャンした可能性があります。内容を確認したい場合だけ、下のボタンを押してください。'+
      '<button class="alert-shipped-btn" onclick="renderOrder()">内容を確認のうえ開く</button>'+

    '</div>';
}

function renderOrder(){
  const o = currentOrder;
  const leadLabel = o.leadType==='scheduled' ? '🗓 日程指定：'+(o.leadDate||'') : (LEAD_LABEL[o.leadType]||o.leadType);
  const leadCls = LEAD_BADGE_CLASS[o.leadType]||'b-normal';
  const hasGift = (o.lines||[]).some(l=>l.giftType==='gift');
  let html = '';
  html += '<div class="back-link no-print" onclick="location.href=\'pickup.html\'">← 出荷待ち一覧に戻る</div>';
  html += '<div class="card">';
  html += '<div class="center" style="font-size:12px;color:#888;margin-bottom:4px">注文番号</div>';
  html += '<div class="center" style="font-size:20px;font-weight:700;margin-bottom:10px">'+esc(o.num)+'</div>';
  html += '<div class="center" style="margin-bottom:10px">';
  html += '<span class="badge '+leadCls+'">'+leadLabel+'</span>';
  if(hasGift) html += '<span class="badge b-gift">🎁 ギフトあり</span>';
  if(o.useRecycle) html += '<span class="badge b-recycle">♻ リサイクル箱</span>';
  html += '</div>';
  html += '<div class="meta-row"><span class="meta-label">お届け先</span><span class="meta-val">'+esc(recipientLabel(o))+'</span></div>';
  html += '<div class="meta-row"><span class="meta-label">郵便番号・住所</span><span class="meta-val">〒'+esc(o.zip)+' '+esc(o.addr)+'</span></div>';
  html += '<div class="meta-row"><span class="meta-label">電話番号</span><span class="meta-val">'+esc(o.tel||'-')+'</span></div>';
  html += '<div class="meta-row"><span class="meta-label">配達時間指定</span><span class="meta-val">'+esc(o.delivTime||'指定なし')+'</span></div>';
  html += '</div>';
  if(o.note){
    html += '<div class="note-box">📝 '+esc(o.note)+'</div>';
  }
  html += '<div class="sec-title no-print">商品チェックリスト（タップしてチェック）</div>';
  html += '<div class="sec-title" style="display:none" id="print-sec-title">商品チェックリスト</div>';
  html += '<div id="item-list">';
  (o.lines||[]).forEach(function(l, i){
    html += '<div class="item" id="item-'+i+'" onclick="toggleItem('+i+')">'+
      '<input type="checkbox" class="cb" id="cb-'+i+'" onclick="event.stopPropagation();toggleItem('+i+')">'+
      '<div class="info">'+
        '<div class="pname">'+esc(l.productName)+'</div>'+
        '<div class="psub">'+esc(l.bottles)+'本'+(l.boxes?'（'+esc(l.boxes)+'箱）':'')+'　['+esc(GIFT_TYPE_LABEL[l.giftType]||l.giftType)+']</div>'+
        (l.memo ? '<div class="pmemo">📝 '+esc(l.memo)+'</div>' : '')+
      '</div>'+
    '</div>';
  });
  html += '</div>';
  html += '<div class="actions no-print">';
  html += '<button class="btn-big btn-complete" id="complete-btn" onclick="completeOrder()">✅ 発送完了にする</button>';
  html += '<button class="btn-big btn-print" onclick="window.print()">🖨 この内容を印刷する</button>';
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function toggleItem(i){
  const item = document.getElementById('item-'+i);
  const cb = document.getElementById('cb-'+i);
  cb.checked = !cb.checked;
  item.classList.toggle('checked', cb.checked);
}

async function completeOrder(){
  if(!currentOrder) return;
  const allItems = document.querySelectorAll('#item-list .item').length;
  const checkedItems = document.querySelectorAll('#item-list .item.checked').length;
  if(checkedItems < allItems){
    if(!confirm('まだチェックしていない商品があります（'+checkedItems+'/'+allItems+'）。それでも発送完了にしますか？')) return;
  }
  const btn = document.getElementById('complete-btn');
  btn.disabled = true;
  btn.textContent = '処理中...';
  try{
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'completePickOrder', orderId: currentOrder.id }),
      headers: {'Content-Type':'text/plain;charset=utf-8'}
    });
    const data = await res.json();
    if(data.status === 'ok'){
      document.getElementById('content').innerHTML =
        '<div class="done-banner">✅ 発送完了として登録しました<br><span style="font-size:13px;font-weight:400">'+esc(currentOrder.num)+'</span></div>'+
        '<button class="btn-big btn-print no-print" onclick="window.print()">🖨 この内容を印刷する</button>'+
        '<button class="btn-big btn-print no-print" onclick="location.href=\'pickup.html\'">← 出荷待ち一覧に戻る</button>';
    } else {
      btn.disabled = false;
      btn.textContent = '✅ 発送完了にする';
      alert('処理に失敗しました：'+(data.message||''));
    }
  }catch(err){
    btn.disabled = false;
    btn.textContent = '✅ 発送完了にする';
    alert('通信エラーが発生しました：'+err.message);
  }
}

init();
</script>
</body>
</html>
