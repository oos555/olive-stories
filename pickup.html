<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ピッキング確認</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:15px;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;padding:1rem;min-height:100vh}
.header{background:#1a1a18;color:#fff;padding:14px 16px;border-radius:12px;margin-bottom:1rem}
.header-title{font-size:14px;opacity:.7;margin-bottom:2px}
.header-client{font-size:20px;font-weight:700}
.header-num{font-size:12px;opacity:.6;margin-top:2px}
.progress-bar{background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.progress-track{flex:1;height:8px;background:#e8e7e3;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:#16a34a;border-radius:99px;transition:width .3s}
.progress-text{font-size:13px;font-weight:700;color:#16a34a;white-space:nowrap}
.item-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:2px solid #e8e7e3}
.item-card.done{border-color:#16a34a;background:#f0fdf4}
.item-name{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.item-check{width:24px;height:24px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.item-check.checked{background:#16a34a;border-color:#16a34a;color:#fff}
.box-row{display:flex;align-items:center;justify-content:space-between;background:#f9f8f5;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.box-label{font-size:14px;color:#555}
.box-btn{padding:8px 16px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer}
.box-btn.unchecked{background:#dbeafe;color:#1e3a8a}
.box-btn.checked{background:#16a34a;color:#fff}
.bara-row{background:#f9f8f5;border-radius:8px;padding:10px 12px}
.bara-label{font-size:14px;color:#555;margin-bottom:8px;display:flex;justify-content:space-between}
.bara-controls{display:flex;align-items:center;gap:10px}
.bara-btn{width:44px;height:44px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:20px;font-weight:700;cursor:pointer}
.bara-btn:disabled{background:#ccc}
.bara-count{flex:1;text-align:center;font-size:22px;font-weight:700}
.scan-btn{width:100%;padding:12px;background:#185fa5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.note-box{background:#fef3c7;border:2px solid #f59e0b;border-radius:8px;padding:12px 14px;margin-bottom:1rem;font-size:14px;font-weight:700;color:#78350f}
.complete-area{margin-top:1.5rem;padding-top:1.5rem;border-top:2px dashed #ccc}
.photo-btn{width:100%;padding:14px;background:#fff;border:2px dashed #185fa5;color:#185fa5;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
.complete-btn{width:100%;padding:16px;background:#ccc;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:not-allowed}
.complete-btn.ready{background:#16a34a;cursor:pointer}
.resume-banner{background:#fef3c7;border:2px solid #f59e0b;border-radius:8px;padding:12px 14px;margin-bottom:1rem;font-size:13px;color:#78350f}
.loading{text-align:center;padding:3rem 1rem;color:#888}
#scanner-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:none;flex-direction:column}
#scanner-video{flex:1;width:100%;object-fit:cover}
.scanner-close{position:absolute;top:16px;right:16px;width:40px;height:40px;background:rgba(255,255,255,.9);border-radius:50%;border:none;font-size:20px;z-index:10000}
.scanner-hint{position:absolute;bottom:30px;left:0;right:0;text-align:center;color:#fff;font-size:14px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading">読み込み中...</div>
</div>

<div id="scanner-modal">
  <button class="scanner-close" onclick="closeScanner()">✕</button>
  <video id="scanner-video" autoplay playsinline></video>
  <div class="scanner-hint">バーコードを枠内に合わせてください</div>
</div>

<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<script>
// ════════════════════════════════════
// GAS連携設定
// ════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwDB38ZSkvMJim2ke4a5p5h7NRDV6gV-N_7ZXnhY7AleMYZ9E0Vx7g8Jtc59NfXhnVb/exec';

// URLパラメータから受注IDを取得
const params = new URLSearchParams(window.location.search);
const orderId = params.get('id');

let orderData = null;
let pickState = {}; // {productId: {boxChecked: bool, baraCount: number}}
let currentScanTarget = null; // どの商品をスキャン中か
let codeReader = null;

// ════════════════════════════════════
// 初期化
// ════════════════════════════════════
async function init(){
  if(!orderId){
    document.getElementById('app').innerHTML = '<div class="loading">受注IDが見つかりません</div>';
    return;
  }
  try {
    const res = await fetch(GAS_URL + '?action=getPickOrder&orderId=' + orderId);
    const data = await res.json();
    if(data.status !== 'ok' || !data.order){
      document.getElementById('app').innerHTML = '<div class="loading">受注データが見つかりません</div>';
      return;
    }
    orderData = data.order;
    pickState = data.pickState || {};
    render();
  } catch(e){
    document.getElementById('app').innerHTML = '<div class="loading">読み込みエラー。電波の良い場所で再度お試しください。</div>';
  }
}

// ════════════════════════════════════
// 描画
// ════════════════════════════════════
function render(){
  const lines = orderData.lines || [];
  let allDone = true;
  let totalItems = lines.length;
  let doneItems = 0;

  let html = '';

  // 中断していた場合のバナー
  if(Object.keys(pickState).length > 0){
    html += '<div class="resume-banner">⏰ 前回の続きから再開します</div>';
  }

  html += '<div class="header">';
  html += '<div class="header-title">出荷ピッキング</div>';
  html += '<div class="header-client">'+(orderData.client||'')+' 様</div>';
  html += '<div class="header-num">'+(orderData.num?'注文番号: '+orderData.num:'')+'</div>';
  html += '</div>';

  if(orderData.note){
    html += '<div class="note-box">⚠️ '+orderData.note+'</div>';
  }

  lines.forEach(function(l, idx){
    const key = String(l.productId);
    const state = pickState[key] || {boxChecked:false, baraCount:0};
    const boxes = l.boxes||0;
    const bottles = l.bottles||0;
    const isBoxDone = boxes===0 || state.boxChecked;
    const isBaraDone = bottles===0 || state.baraCount >= bottles;
    const itemDone = isBoxDone && isBaraDone;
    if(itemDone) doneItems++; else allDone = false;

    html += '<div class="item-card '+(itemDone?'done':'')+'">';
    html += '<div class="item-name"><span class="item-check '+(itemDone?'checked':'')+'">'+(itemDone?'✓':'')+'</span>'+(l.productName||'商品')+'</div>';

    if(boxes > 0){
      html += '<div class="box-row">';
      html += '<span class="box-label">📦 '+boxes+'箱</span>';
      html += '<button class="box-btn '+(state.boxChecked?'checked':'unchecked')+'" onclick="toggleBox(\''+key+'\')">'+(state.boxChecked?'✓ 確認済み':'箱を確認')+'</button>';
      html += '</div>';
    }

    if(bottles > 0){
      html += '<div class="bara-row">';
      html += '<div class="bara-label"><span>🔹 バラ '+bottles+'本</span><span>'+state.baraCount+'/'+bottles+'</span></div>';
      html += '<div class="bara-controls">';
      html += '<button class="bara-btn" onclick="adjustBara(\''+key+'\',-1)" '+(state.baraCount<=0?'disabled':'')+'>－</button>';
      html += '<span class="bara-count">'+state.baraCount+'</span>';
      html += '<button class="bara-btn" onclick="adjustBara(\''+key+'\',1)" '+(state.baraCount>=bottles?'disabled':'')+'>＋</button>';
      html += '</div>';
      html += '<button class="scan-btn" onclick="startScan(\''+key+'\')">📷 バーコードをスキャン</button>';
      html += '</div>';
    }

    html += '</div>';
  });

  // 進捗バー
  const pct = totalItems ? Math.round(doneItems/totalItems*100) : 0;
  let progressHtml = '<div class="progress-bar">';
  progressHtml += '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  progressHtml += '<div class="progress-text">'+doneItems+'/'+totalItems+'</div>';
  progressHtml += '</div>';

  html = progressHtml + html;

  // 完了エリア
  html += '<div class="complete-area">';
  html += '<button class="photo-btn" onclick="document.getElementById(\'photo-input\').click()">📸 梱包写真をアップロード</button>';
  html += '<input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)">';
  html += '<div id="photo-preview"></div>';
  html += '<button class="complete-btn '+(allDone?'ready':'')+'" '+(allDone?'onclick="completeShipping()"':'disabled')+'>'
    + (allDone ? '✅ 発送完了' : '🔒 全商品確認後に押せます')+'</button>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
}

// ════════════════════════════════════
// 箱チェック
// ════════════════════════════════════
function toggleBox(key){
  if(!pickState[key]) pickState[key] = {boxChecked:false, baraCount:0};
  pickState[key].boxChecked = !pickState[key].boxChecked;
  savePickState();
  render();
}

// ════════════════════════════════════
// バラ数調整
// ════════════════════════════════════
function adjustBara(key, delta){
  if(!pickState[key]) pickState[key] = {boxChecked:false, baraCount:0};
  const line = orderData.lines.find(function(l){ return String(l.productId)===key; });
  const max = line ? line.bottles : 0;
  let newCount = pickState[key].baraCount + delta;
  newCount = Math.max(0, Math.min(max, newCount));
  pickState[key].baraCount = newCount;
  savePickState();
  render();
}

// ════════════════════════════════════
// バーコードスキャン
// ════════════════════════════════════
function startScan(key){
  currentScanTarget = key;
  document.getElementById('scanner-modal').style.display = 'flex';
  const videoEl = document.getElementById('scanner-video');

  codeReader = new ZXing.BrowserMultiFormatReader();
  codeReader.decodeFromConstraints(
    {video: {facingMode: 'environment'}},
    videoEl,
    function(result, err){
      if(result){
        onScanSuccess(result.getText());
      }
    }
  );
}

function onScanSuccess(code){
  // スキャン成功で1個分カウントアップ
  if(currentScanTarget){
    adjustBara(currentScanTarget, 1);
  }
  closeScanner();
  // バイブレーション（対応端末のみ）
  if(navigator.vibrate) navigator.vibrate(100);
}

function closeScanner(){
  document.getElementById('scanner-modal').style.display = 'none';
  if(codeReader){
    codeReader.reset();
    codeReader = null;
  }
  currentScanTarget = null;
}

// ════════════════════════════════════
// 進捗の自動保存
// ════════════════════════════════════
let saveTimer = null;
function savePickState(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    fetch(GAS_URL + '?action=savePickState&orderId=' + orderId + '&state=' + encodeURIComponent(JSON.stringify(pickState)))
      .catch(function(){ console.log('進捗保存エラー'); });
  }, 500);
}

// ════════════════════════════════════
// 写真アップロード
// ════════════════════════════════════
let photoData = null;
function onPhotoSelected(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    photoData = ev.target.result;
    document.getElementById('photo-preview').innerHTML =
      '<img src="'+photoData+'" style="width:100%;border-radius:8px;margin-top:8px">';
  };
  reader.readAsDataURL(file);
}

// ════════════════════════════════════
// 発送完了
// ════════════════════════════════════
function completeShipping(){
  if(!confirm(orderData.client+' 様の発送を完了として記録しますか？')) return;

  fetch(GAS_URL + '?action=completePickOrder&orderId=' + orderId)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.status==='ok'){
        document.getElementById('app').innerHTML =
          '<div style="text-align:center;padding:3rem 1rem">'
          +'<div style="font-size:48px;margin-bottom:1rem">✅</div>'
          +'<div style="font-size:18px;font-weight:700;margin-bottom:8px">発送完了しました</div>'
          +'<div style="color:#888;font-size:14px">'+orderData.client+' 様<br>お疲れ様でした</div>'
          +'</div>';
      } else {
        alert('エラーが発生しました。もう一度お試しください。');
      }
    }).catch(function(){
      alert('接続エラー。電波の良い場所で再度お試しください。');
    });
}

init();
</script>
</body>
</html>
