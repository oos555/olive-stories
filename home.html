<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olive Oil Stories｜玄関</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2a26;          /* ほぼ黒（本文） */
    --paper:#faf7f2;        /* 生成りの背景 */
    --card:#ffffff;
    --sage:#a3b18a;         /* マルシェ */
    --sage-deep:#55622e;
    --sage-ink:#33421f;
    --rose:#c9a9a6;         /* アトリエ */
    --rose-deep:#8d6a66;
    --rose-ink:#4a3532;
    --line:#e8e2d8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .wrap{max-width:860px; margin:0 auto;}

  /* ── ブランドの看板 ── */
  .brand{text-align:center; margin-bottom:6px;}
  .brand h1{
    font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;
    font-weight:700; font-size:26px; letter-spacing:.06em;
    color:var(--sage-deep);
  }
  .brand .sub{
    font-size:13px; color:var(--ink); letter-spacing:.28em; margin-top:4px;
  }
  .greeting{
    text-align:center; font-size:14px; color:var(--ink);
    margin:14px 0 26px;
  }
  .branch{
    display:block; margin:10px auto 0; width:120px; height:14px; opacity:.8;
  }

  /* ── ふたつの小箱 ── */
  .boxes{
    display:grid; grid-template-columns:1fr 1fr; gap:20px;
  }
  @media (max-width:640px){ .boxes{grid-template-columns:1fr;} }

  .box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(85,98,46,.08);
  }
  .box-head{
    padding:16px 20px 14px;
    display:flex; align-items:baseline; gap:10px;
  }
  .box-head .name{
    font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;
    font-weight:700; font-size:20px; letter-spacing:.08em;
  }
  .box-head .note{font-size:12px;}
  .marche .box-head{background:var(--sage); color:var(--sage-ink);}
  .atelier .box-head{background:var(--rose); color:var(--rose-ink);}

  .box-body{padding:16px 16px 20px;}
  .box-lead{font-size:12.5px; margin:0 6px 12px; color:var(--ink);}

  .apps{display:flex; flex-direction:column; gap:10px;}
  .app{
    display:flex; align-items:center; gap:12px;
    padding:13px 16px;
    background:#fdfcf9;
    border:1px solid var(--line);
    border-radius:12px;
    text-decoration:none;
    color:var(--ink);
    font-size:15.5px; font-weight:600;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .app:hover{transform:translateY(-1px); box-shadow:0 4px 10px rgba(0,0,0,.07);}
  .app:focus-visible{outline:3px solid var(--sage-deep); outline-offset:2px;}
  .marche .app:hover{border-color:var(--sage);}
  .atelier .app:hover{border-color:var(--rose);}
  .app .emoji{font-size:20px; width:26px; text-align:center;}
  .app .tag{
    margin-left:auto;
    font-size:11.5px; font-weight:700;
    padding:3px 9px; border-radius:999px;
  }
  .marche .app .tag{background:#eef1e6; color:var(--sage-deep);}
  .atelier .app .tag{background:#f5ecea; color:var(--rose-deep);}

  .app.small{
    font-size:13.5px; padding:10px 16px; font-weight:500;
    background:transparent; border-style:dashed;
  }

  footer{
    text-align:center; margin-top:34px;
    font-size:11.5px; color:var(--ink); opacity:.65; letter-spacing:.1em;
  }

  @media (prefers-reduced-motion:no-preference){
    .box{animation:rise .5s ease both;}
    .box.atelier{animation-delay:.08s;}
    @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <h1>Olive Oil Stories</h1>
    <div class="sub">お し ご と の 玄 関</div>
    <svg class="branch" viewBox="0 0 120 14" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M4 7 H116" stroke="#a3b18a" stroke-width="1.2" stroke-linecap="round"/>
      <ellipse cx="48" cy="7" rx="5" ry="2.6" fill="#a3b18a" transform="rotate(-24 48 7)"/>
      <ellipse cx="60" cy="7" rx="5" ry="2.6" fill="#8a9a6f" transform="rotate(20 60 7)"/>
      <ellipse cx="72" cy="7" rx="5" ry="2.6" fill="#a3b18a" transform="rotate(-18 72 7)"/>
    </svg>
  </div>
  <p class="greeting" id="greeting">こんにちは。今日はどちらから始めますか？</p>

  <div class="boxes">

    <!-- ── マルシェ（業務の箱） ── -->
    <section class="box marche">
      <div class="box-head">
        <span class="name">🧺 マルシェ</span>
        <span class="note">毎日のおしごと</span>
      </div>
      <div class="box-body">
        <div class="apps">
          <a class="app" href="index.html"><span class="emoji">🫒</span>受注・出荷<span class="tag">A</span></a>
          <a class="app" href="stock.html"><span class="emoji">📦</span>在庫<span class="tag">B</span></a>
          <a class="app" href="billing.html"><span class="emoji">🧾</span>請求<span class="tag">C</span></a>
          <a class="app" href="sales.html"><span class="emoji">🤝</span>営業<span class="tag">F</span></a>
          <a class="app" href="yuka.html"><span class="emoji">📮</span>ゆかメモ<span class="tag">J</span></a>
          <a class="app small" href="pickup.html"><span class="emoji">🚚</span>倉庫のようすを見る<span class="tag">D</span></a>
        </div>
      </div>
    </section>

    <!-- ── アトリエ（鍵のかかる箱） ── -->
    <section class="box atelier">
      <div class="box-head">
        <span class="name">🎨 アトリエ</span>
        <span class="note">🔒 合言葉のいる場所</span>
      </div>
      <div class="box-body">
        <div class="apps">
          <a class="app" href="import.html"><span class="emoji">✈️</span>輸入<span class="tag">E</span></a>
          <a class="app" href="documents.html"><span class="emoji">📂</span>書類<span class="tag">G</span></a>
          <a class="app" href="marketing.html"><span class="emoji">📣</span>マケ<span class="tag">H</span></a>
          <a class="app" href="nakamura.html"><span class="emoji">🗒️</span>中村メモ<span class="tag">I</span></a>
        </div>
      </div>
    </section>

  </div>

  <footer>OLIVE OIL STORIES ｜ 社内ページ</footer>
</div>

<script>
  // 時間帯であいさつを変える、小さなおもてなし
  (function(){
    var h = new Date().getHours();
    var g;
    if(h >= 5 && h < 11)       g = 'おはようございます☀️ 今日はどちらから始めますか？';
    else if(h >= 11 && h < 17) g = 'こんにちは。今日はどちらから始めますか？';
    else if(h >= 17 && h < 22) g = 'こんばんは。今日もおつかれさまです🌙';
    else                        g = '夜遅くまでおつかれさまです。ほどほどにね🌙';
    document.getElementById('greeting').textContent = g;
  })();
</script>
</body>
</html>
